# Deploy automatico su GitHub Pages a ogni push su main.
# Prerequisito: Settings → Pages → Source: "GitHub Actions".
name: Deploy su GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}
  schedule:
    # Ricostruzione ogni 30 min nella fascia 9-21 italiana: fa "apparire" gli
    # articoli programmati dallo scheduler man mano che il loro orario arriva.
    # (cron in UTC: 7-19 UTC ≈ 9-21 in Italia con l'ora legale)
    - cron: '5,35 7-19 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Installa dipendenze
        run: npm ci
      - name: Build del sito
        run: npm run build
      - name: Carica il sito per Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
